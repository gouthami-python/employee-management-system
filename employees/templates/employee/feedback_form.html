{% extends 'base.html' %}

{% block title %}Submit Feedback - Employee Management System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-comment"></i> Submit Feedback</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="subject" class="form-label">Subject</label>
                <input type="text" class="form-control" id="subject" name="subject" required>
            </div>
            <div class="mb-3">
                <label for="feedback" class="form-label">Feedback</label>
                <textarea class="form-control" id="feedback" name="feedback" rows="5" required></textarea>
            </div>
            <div class="mb-3">
                <label for="rating" class="form-label">Overall Rating</label>
                <select class="form-control" id="rating" name="rating">
                    <option value="5">Excellent</option>
                    <option value="4">Good</option>
                    <option value="3" selected>Average</option>
                    <option value="2">Poor</option>
                    <option value="1">Very Poor</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success">Submit Feedback</button>
            <a href="{% url 'employee_dashboard' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
