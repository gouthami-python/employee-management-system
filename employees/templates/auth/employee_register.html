<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration - TechCorp Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0dcaf0 0%, #17a2b8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
            position: relative;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 20s infinite;
        }
        .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; bottom: -80px; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 60px; height: 60px; left: 30%; bottom: -60px; animation-delay: 4s; }
        .bubble:nth-child(3) { width: 100px; height: 100px; left: 50%; bottom: -100px; animation-delay: 8s; }
        .bubble:nth-child(4) { width: 70px; height: 70px; left: 70%; bottom: -70px; animation-delay: 12s; }
        .bubble:nth-child(5) { width: 90px; height: 90px; left: 85%; bottom: -90px; animation-delay: 16s; }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-1000px) rotate(360deg); opacity: 0; }
        }
        .register-container {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            overflow: hidden;
            max-width: 550px;
            width: 100%;
            position: relative;
            z-index: 10;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .register-header {
            background: linear-gradient(135deg, #0dcaf0 0%, #17a2b8 100%);
            color: white;
            padding: 1.25rem 2rem;
            text-align: center;
        }
        .register-icon {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.4rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .form-control {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 8px 12px;
            transition: all 0.3s ease;
            font-size: 13px;
        }
        .form-control:focus {
            border-color: #0dcaf0;
            box-shadow: 0 0 0 0.2rem rgba(13, 202, 240, 0.25);
            transform: translateY(-2px);
        }
        .input-group-text {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
            border-radius: 8px 0 0 8px;
            padding: 8px 10px;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        .btn-register {
            background: linear-gradient(135deg, #0dcaf0 0%, #17a2b8 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(13, 202, 240, 0.4);
        }
        .btn-secondary {
            border-radius: 8px;
            padding: 8px 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    {% if messages %}
        <div class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 1050;">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="register-container mx-auto">
                    <div class="register-header">
                        <div class="register-icon">
                            <i class="fas fa-user-plus fa-lg"></i>
                        </div>
                        <h4 class="mb-0 fw-bold">Employee Registration</h4>
                        <p class="mb-0 opacity-75 small">Join our team today</p>
                    </div>
                    
                    <div class="p-2">
                        <form method="post">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-6 mb-1">
                                    <label for="first_name" class="form-label small fw-semibold mb-1"><i class="fas fa-user me-1"></i>First Name</label>
                                    <input type="text" class="form-control" id="first_name" name="first_name" placeholder="John" required>
                                </div>
                                <div class="col-6 mb-1">
                                    <label for="last_name" class="form-label small fw-semibold mb-1"><i class="fas fa-user me-1"></i>Last Name</label>
                                    <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Doe" required>
                                </div>
                            </div>
                            <div class="mb-1">
                                <label for="username" class="form-label small fw-semibold mb-1"><i class="fas fa-id-badge me-1"></i>Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-at"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="johndoe" required>
                                </div>
                            </div>
                            <div class="mb-1">
                                <label for="email" class="form-label small fw-semibold mb-1"><i class="fas fa-envelope me-1"></i>Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="john@example.com" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-1">
                                    <label for="password1" class="form-label small fw-semibold mb-1"><i class="fas fa-lock me-1"></i>Password</label>
                                    <input type="password" class="form-control" id="password1" name="password1" placeholder="••••••••" required>
                                </div>
                                <div class="col-6 mb-1">
                                    <label for="password2" class="form-label small fw-semibold mb-1"><i class="fas fa-lock me-1"></i>Confirm</label>
                                    <input type="password" class="form-control" id="password2" name="password2" placeholder="••••••••" required>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label for="phone" class="form-label small fw-semibold mb-1"><i class="fas fa-phone me-1"></i>Phone (Optional)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="+1 234 567 8900">
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-info btn-register">
                                    <i class="fas fa-user-plus me-2"></i>Create Account
                                </button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-2">
                            <div class="mb-2">
                                <small class="text-muted">
                                    Already have an account? <a href="{% url 'employee_login' %}" class="text-decoration-none fw-semibold">Login here</a>
                                </small>
                            </div>
                            <a href="{% url 'home' %}" class="btn btn-secondary btn-sm">
                                <i class="fas fa-home me-1"></i>Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
