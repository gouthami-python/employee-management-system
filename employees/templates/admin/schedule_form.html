{% extends 'base.html' %}

{% block title %}Add Work Schedule{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title">
                        <i class="fas fa-calendar-plus me-2"></i>Add Work Schedule
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="{{ form.employee.id_for_label }}" class="form-label">Employee</label>
                                    {{ form.employee }}
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="{{ form.day_of_week.id_for_label }}" class="form-label">Day of Week</label>
                                    {{ form.day_of_week }}
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="{{ form.start_time.id_for_label }}" class="form-label">Start Time</label>
                                    {{ form.start_time }}
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="{{ form.end_time.id_for_label }}" class="form-label">End Time</label>
                                    {{ form.end_time }}
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <div class="form-check mt-4">
                                        {{ form.is_working_day }}
                                        <label for="{{ form.is_working_day.id_for_label }}" class="form-check-label">
                                            Is Working Day
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'admin_work_schedules' %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Back to Schedules
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save Schedule
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
