{% extends 'base.html' %}

{% block title %}Attendance Report{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="fas fa-chart-bar"></i> Attendance Report</h2>
    <a href="{% url 'admin_attendance_list' %}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Attendance
    </a>
</div>

<div class="card mt-4">
    <div class="card-body">
        <form method="get" class="row g-3">
            <div class="col-md-4">
                <label>Month</label>
                <select name="month" class="form-control">
                    <option value="1" {% if month == 1 %}selected{% endif %}>January</option>
                    <option value="2" {% if month == 2 %}selected{% endif %}>February</option>
                    <option value="3" {% if month == 3 %}selected{% endif %}>March</option>
                    <option value="4" {% if month == 4 %}selected{% endif %}>April</option>
                    <option value="5" {% if month == 5 %}selected{% endif %}>May</option>
                    <option value="6" {% if month == 6 %}selected{% endif %}>June</option>
                    <option value="7" {% if month == 7 %}selected{% endif %}>July</option>
                    <option value="8" {% if month == 8 %}selected{% endif %}>August</option>
                    <option value="9" {% if month == 9 %}selected{% endif %}>September</option>
                    <option value="10" {% if month == 10 %}selected{% endif %}>October</option>
                    <option value="11" {% if month == 11 %}selected{% endif %}>November</option>
                    <option value="12" {% if month == 12 %}selected{% endif %}>December</option>
                </select>
            </div>
            <div class="col-md-4">
                <label>Year</label>
                <input type="number" name="year" value="{{ year }}" class="form-control">
            </div>
            <div class="col-md-4">
                <label>&nbsp;</label>
                <button type="submit" class="btn btn-primary d-block">Generate Report</button>
            </div>
        </form>
        
        <div class="mt-4">
            <p class="text-muted">Select month and year to view attendance report</p>
        </div>
    </div>
</div>
{% endblock %}
