{% extends 'base.html' %}

{% block title %}Add Review - Admin Panel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-star"></i> Add Employee Review</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="employee" class="form-label">Employee</label>
                {{ form.employee }}
            </div>
            <div class="mb-3">
                <label for="rating" class="form-label">Rating</label>
                {{ form.rating }}
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="review_period_start" class="form-label">Review Period Start</label>
                    {{ form.review_period_start }}
                </div>
                <div class="col-md-6 mb-3">
                    <label for="review_period_end" class="form-label">Review Period End</label>
                    {{ form.review_period_end }}
                </div>
            </div>
            <div class="mb-3">
                <label for="feedback" class="form-label">Feedback</label>
                {{ form.feedback }}
            </div>
            <button type="submit" class="btn btn-primary">Submit Review</button>
            <a href="{% url 'review_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
