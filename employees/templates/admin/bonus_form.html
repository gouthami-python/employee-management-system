{% extends 'base.html' %}

{% block title %}Add Bonus - {{ employee.user.get_full_name }}{% endblock %}

{% block content %}
<h2><i class="fas fa-gift"></i> Add Bonus - {{ employee.user.get_full_name }}</h2>

<div class="card mt-4">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" name="amount" class="form-control" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Bonus Type</label>
                <select name="bonus_type" class="form-select" required>
                    <option value="performance">Performance</option>
                    <option value="festival">Festival</option>
                    <option value="annual">Annual</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Reason</label>
                <textarea name="reason" class="form-control" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-success">Add Bonus</button>
            <a href="{% url 'admin_salary_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
