{% extends 'base.html' %}

{% block title %}Add Announcement - Admin Panel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-bullhorn"></i> Add Announcement</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                {{ form.title }}
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">Content</label>
                {{ form.content }}
            </div>
            <div class="mb-3">
                <label for="department" class="form-label">Department (Leave blank for all departments)</label>
                {{ form.department }}
            </div>
            <div class="mb-3 form-check">
                {{ form.is_active }}
                <label class="form-check-label" for="is_active">
                    Active
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Create Announcement</button>
            <a href="{% url 'announcement_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
