{% extends 'base.html' %}

{% block title %}Generate Payroll{% endblock %}

{% block content %}
<h2><i class="fas fa-cogs"></i> Generate Payroll</h2>

<div class="card mt-4">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Month</label>
                <select name="month" class="form-select" required>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" name="year" class="form-control" value="2024" required>
            </div>
            <button type="submit" class="btn btn-success">Generate Payroll</button>
            <a href="{% url 'admin_payroll_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
