{% extends 'base.html' %}

{% block title %}{{ action }} Department - Admin Panel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-building"></i> {{ action }} Department</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="name" class="form-label">Department Name</label>
                {{ form.name }}
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                {{ form.description }}
            </div>
            <div class="mb-3">
                <label for="head" class="form-label">Department Head</label>
                {{ form.head }}
            </div>
            <button type="submit" class="btn btn-primary">{{ action }} Department</button>
            <a href="{% url 'department_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
